global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: prometheus
          environment: production

  - job_name: "backend"
    scrape_interval: 10s
    metrics_path: /metrics
    static_configs:
      - targets:
          - "backend:8000"
        labels:
          service: flight-fare-backend
          environment: production
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: "([^:]+)(?::[0-9]+)?"
        replacement: "${1}"

  - job_name: "postgres"
    static_configs:
      - targets:
          - "postgres-exporter:9187"
        labels:
          service: postgres
          environment: production

  - job_name: "redis"
    static_configs:
      - targets:
          - "redis-exporter:9121"
        labels:
          service: redis
          environment: production

  - job_name: "nginx"
    static_configs:
      - targets:
          - "nginx-exporter:9113"
        labels:
          service: nginx
          environment: production

  - job_name: "node-exporter"
    static_configs:
      - targets:
          - "node-exporter:9100"
        labels:
          service: node
          environment: production
