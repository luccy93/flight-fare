apiVersion: v1
kind: ConfigMap
metadata:
  name: flight-fare-config
  namespace: flight-fare
  labels:
    app.kubernetes.io/name: flight-fare
    app.kubernetes.io/part-of: flight-fare-prediction
data:
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  ENVIRONMENT: "production"
  POSTGRES_DB: "flight_fare"
  POSTGRES_USER: "postgres"
  REDIS_URL: "redis://redis-service:6379"
  DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres-service:5432/flight_fare"
  NEXT_PUBLIC_API_URL: "https://flight-fare.example.com"
  PROMETHEUS_RETENTION: "15d"
  GRAFANA_ADMIN_USER: "admin"
